<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anatolia Sim — Başlat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #040412;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #0d0d2b;
      border: 1px solid #1e2a4a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 { font-size: 24px; font-weight: 700; color: #7c3aed; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 40px; }
    .options { display: flex; gap: 16px; }
    .option {
      flex: 1;
      background: #060618;
      border: 2px solid #1e2a4a;
      border-radius: 12px;
      padding: 28px 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .option:hover { border-color: #7c3aed; background: #0d0d2b; }
    .option.selected { border-color: #7c3aed; background: #1a0a3a; }
    .icon { font-size: 40px; margin-bottom: 12px; }
    .option-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .option-desc { font-size: 12px; color: #64748b; line-height: 1.5; }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 32px;
      background: #7c3aed;
      color: white;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌍 Anatolia Sim</h1>
    <p class="subtitle">Simülasyonu nerede çalıştırmak istiyorsun?</p>

    <div class="options">
      <div class="option" id="opt-local" onclick="select('local')">
        <div class="icon">💻</div>
        <div class="option-title">Yerel</div>
        <div class="option-desc">Simülasyon bu bilgisayarda çalışır. Veriler bilgisayarında saklanır. Giriş/hesap bilgilerin bulutta kalır.</div>
      </div>
      <div class="option" id="opt-cloud" onclick="select('cloud')">
        <div class="icon">☁️</div>
        <div class="option-title">Bulut</div>
        <div class="option-desc">Her şey Render sunucusunda çalışır. Her cihazdan erişebilirsin. Depolama alanı sınırlıdır.</div>
      </div>
    </div>

    <button class="btn" id="btn" onclick="confirm()" disabled>Devam Et</button>
  </div>

  <script>
    let chosen = null;

    function select(mode) {
      chosen = mode;
      document.getElementById('opt-local').classList.toggle('selected', mode === 'local');
      document.getElementById('opt-cloud').classList.toggle('selected', mode === 'cloud');
      document.getElementById('btn').disabled = false;
    }

    function confirm() {
      if (!chosen) return;
      window.electronMode.select(chosen);
    }
  </script>
</body>
</html>
