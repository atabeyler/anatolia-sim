services:
  - name: anatolia-sim
    type: web
    git:
      repository: github.com/atabeyler/anatolia-sim
      branch: main
      build_command: cd client && npm install --include=dev && npm run build && cd ../server && npm install
      run_command: node server/src/index.js
    instance_type: free
    regions:
      - fra
    ports:
      - port: 8000
        protocol: http
    routes:
      - port: 8000
        path: /
    health_checks:
      - path: /api/health
        port: 8000
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        value: REPLACE_ME
      - key: JWT_SECRET
        value: REPLACE_ME
      - key: JWT_REFRESH_SECRET
        value: REPLACE_ME
      - key: ANTHROPIC_API_KEY
        value: REPLACE_ME
      - key: ELEVENLABS_API_KEY
        value: REPLACE_ME
      - key: ADMIN_EMAIL
        value: info@boldkimya.com.tr
