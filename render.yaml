services:
  - type: web
    name: anatolia-sim-server
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: anatolia-sim-client
          property: url

  - type: web
    name: anatolia-sim-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: anatolia-sim-server
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

