services:
  - type: web
    name: anatolia-sim
    env: node
    branch: main
    plan: free
    autoDeployTrigger: commit
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../server && npm install --include=dev
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISABLE_WORKERS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: info@boldkimya.com.tr
      - key: ADMIN_SEED_TOKEN
        generateValue: true
      - key: ADMIN_USER_CODE
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
