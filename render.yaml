services:
  - type: web
    name: anatolia-sim
    env: rust
    rootDir: .
    branch: main
    plan: free
    autoDeployTrigger: commit
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../rust && cargo build --release -p sim-server
    startCommand: cd rust && cargo run -p sim-server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: info@boldkimya.com.tr
      - key: ADMIN_SEED_TOKEN
        generateValue: true
      - key: ADMIN_USER_CODE
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
