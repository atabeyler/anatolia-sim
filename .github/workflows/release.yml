name: Desktop Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Root build
        run: npm run build

      - name: Desktop release build
        working-directory: desktop/src-tauri
        run: cargo build --release

      - name: Upload desktop binary
        uses: actions/upload-artifact@v4
        with:
          name: anatolia-sim-desktop-windows
          path: desktop/src-tauri/target/release/anatolia-sim-desktop.exe
