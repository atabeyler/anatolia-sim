name: Windows Installer Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows NSIS Installer
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Client bağımlılıklarını yükle
        working-directory: client
        run: npm ci

      - name: Client build
        working-directory: client
        run: npm run build

      - name: Server bağımlılıklarını yükle (sadece prod)
        working-directory: server
        run: npm ci --omit=dev

      - name: Root bağımlılıklarını yükle
        run: npm ci

      # electron-builder publish: exe + latest.yml GitHub Release'a yüklenir
      # latest.yml olmadan auto-updater çalışmaz
      - name: Windows installer oluştur ve yayınla
        run: npx electron-builder --win nsis --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
