name: Windows Installer Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows NSIS Installer
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Client bağımlılıklarını yükle
        working-directory: client
        run: npm ci

      - name: Client build
        working-directory: client
        run: npm run build

      - name: Server bağımlılıklarını yükle (sadece prod)
        working-directory: server
        run: npm ci --omit=dev

      - name: Root bağımlılıklarını yükle
        run: npm ci

      # DATABASE_URL'yi exe'ye göm — kodda görünmez, sadece build sırasında yazılır
      - name: Uygulama config dosyasını oluştur
        shell: bash
        run: |
          echo '{"DATABASE_URL":"${{ secrets.DATABASE_URL }}"}' > desktop/bundled-config.json

      - name: Windows installer oluştur ve yayınla
        run: npx electron-builder --win nsis --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
